<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="150" viewBox="0 0 1100 150" role="img" aria-label="Hackathon medals">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="violet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="rose" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fda4af"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1100" height="150" rx="18" fill="#061018"/>
  <text x="28" y="32" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" letter-spacing="2">HACKATHON MEDALS</text>

  <!-- medal 1 -->
  <g transform="translate(40,48)" filter="url(#glow)">
    <circle cx="40" cy="38" r="28" fill="url(#gold)" opacity="0.95"/>
    <circle cx="40" cy="38" r="22" fill="#061018" opacity="0.35"/>
    <text x="40" y="43" text-anchor="middle" fill="#fff7ed" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">7th</text>
    <text x="40" y="88" text-anchor="middle" fill="#fde68a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600">Cursor Buildathon</text>
  </g>

  <!-- medal 2 -->
  <g transform="translate(220,48)" filter="url(#glow)">
    <circle cx="40" cy="38" r="28" fill="url(#silver)" opacity="0.95"/>
    <circle cx="40" cy="38" r="22" fill="#061018" opacity="0.35"/>
    <text x="40" y="43" text-anchor="middle" fill="#f8fafc" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700">17th</text>
    <text x="40" y="88" text-anchor="middle" fill="#cbd5e1" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600">LabLab WebData</text>
  </g>

  <!-- medal 3 -->
  <g transform="translate(400,48)" filter="url(#glow)">
    <circle cx="40" cy="38" r="28" fill="url(#teal)" opacity="0.95"/>
    <circle cx="40" cy="38" r="22" fill="#061018" opacity="0.35"/>
    <text x="40" y="43" text-anchor="middle" fill="#ecfdf5" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700">AMD</text>
    <text x="40" y="88" text-anchor="middle" fill="#99f6e4" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600">ACT II Unicorn</text>
  </g>

  <!-- medal 4 -->
  <g transform="translate(580,48)" filter="url(#glow)">
    <circle cx="40" cy="38" r="28" fill="url(#blue)" opacity="0.95"/>
    <circle cx="40" cy="38" r="22" fill="#061018" opacity="0.35"/>
    <text x="40" y="43" text-anchor="middle" fill="#f0f9ff" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700">LIVE</text>
    <text x="40" y="88" text-anchor="middle" fill="#bae6fd" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600">Cursor Live · AdGPT</text>
  </g>

  <!-- medal 5 -->
  <g transform="translate(760,48)" filter="url(#glow)">
    <circle cx="40" cy="38" r="28" fill="url(#violet)" opacity="0.95"/>
    <circle cx="40" cy="38" r="22" fill="#061018" opacity="0.35"/>
    <text x="40" y="43" text-anchor="middle" fill="#f5f3ff" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700">MCP</text>
    <text x="40" y="88" text-anchor="middle" fill="#ddd6fe" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600">Kapruka KAgent</text>
  </g>

  <!-- medal 6 -->
  <g transform="translate(940,48)" filter="url(#glow)">
    <circle cx="40" cy="38" r="28" fill="url(#rose)" opacity="0.95"/>
    <circle cx="40" cy="38" r="22" fill="#061018" opacity="0.35"/>
    <text x="40" y="43" text-anchor="middle" fill="#fff1f2" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="700">H0</text>
    <text x="40" y="88" text-anchor="middle" fill="#fecdd3" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600">Zero Stack · Aria</text>
  </g>
</svg>
