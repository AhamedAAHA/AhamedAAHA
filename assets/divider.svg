<svg xmlns="http://www.w3.org/2000/svg" width="900" height="24" viewBox="0 0 900 24">
  <defs>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect y="11" width="900" height="2" rx="1" fill="url(#line)">
    <animate attributeName="opacity" values="0.45;1;0.45" dur="3s" repeatCount="indefinite"/>
  </rect>
  <circle cx="450" cy="12" r="4" fill="#2dd4bf">
    <animate attributeName="r" values="3;5;3" dur="2.4s" repeatCount="indefinite"/>
  </circle>
</svg>
